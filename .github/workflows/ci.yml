# .github/workflows/ci.yml — v7.0.0
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Type-check (agents) & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate package structure
        run: npm run validate

      - name: Type-check Ultra Agentic modules
        run: npm run type-check:agents

      - name: Run CI test suite
        run: npm run test:ci

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.node-version == '20.x'
        with:
          directory: ./coverage
          fail_ci_if_error: false

  build:
    name: Build agents
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:agents
      - name: Upload agent build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-agents
          path: dist/agents/
          retention-days: 7
